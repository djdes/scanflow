<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Фото накладной</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: #2563eb;
      color: #fff;
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 16px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 24px;
      border: none;
      border-radius: 12px;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .btn-camera {
      background: #2563eb;
      color: #fff;
      min-height: 80px;
    }
    .btn-camera:active { background: #1d4ed8; }
    .btn-camera:disabled { background: #9ca3af; }
    #file-input { display: none; }

    .history {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-radius: 8px;
      padding: 8px;
      border: 1px solid #e5e7eb;
    }
    .history-item img {
      width: 50px;
      height: 66px;
      object-fit: cover;
      border-radius: 4px;
    }
    .history-item .info {
      flex: 1;
      font-size: 14px;
    }
    .history-item .status-icon {
      font-size: 20px;
    }

    .status {
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
    }
    .status-success { background: #dcfce7; color: #166534; }
    .status-error { background: #fef2f2; color: #991b1b; }
    .status-loading { background: #dbeafe; color: #1e40af; }

    .counter {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
      padding: 8px;
    }
  </style>
</head>
<body>
  <div class="header">Фото накладной</div>

  <div class="main">
    <input type="file" id="file-input" accept="image/*" capture="environment">

    <button class="btn btn-camera" id="btn-camera">
      Сфотографировать
    </button>

    <div id="status"></div>

    <div class="counter" id="counter"></div>

    <div class="history" id="history"></div>
  </div>

  <script>
    const API_KEY = 'your-secret-api-key';
    let totalUploaded = 0;
    const history = []; // { url, name, status }

    const fileInput = document.getElementById('file-input');
    const btnCamera = document.getElementById('btn-camera');
    const statusEl = document.getElementById('status');
    const counterEl = document.getElementById('counter');
    const historyEl = document.getElementById('history');

    btnCamera.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      fileInput.value = '';

      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      const ts = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}_${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}`;
      const fileName = `photo_${ts}.jpg`;

      const url = URL.createObjectURL(file);
      const idx = history.length;
      history.push({ url, name: fileName, status: 'uploading' });
      renderHistory();

      btnCamera.disabled = true;
      statusEl.innerHTML = '<div class="status status-loading">Загрузка...</div>';

      try {
        const formData = new FormData();
        formData.append('file', file, fileName);

        const response = await fetch(`/api/upload?filename=${encodeURIComponent(fileName)}`, {
          method: 'POST',
          headers: { 'X-API-Key': API_KEY },
          body: formData,
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${response.status}`);
        }

        const result = await response.json();
        totalUploaded++;
        history[idx].status = 'ok';
        statusEl.innerHTML = `<div class="status status-success">Загружено! (#${result.invoice_id})</div>`;
      } catch (err) {
        history[idx].status = 'error';
        statusEl.innerHTML = `<div class="status status-error">Ошибка: ${err.message}</div>`;
      } finally {
        btnCamera.disabled = false;
        counterEl.textContent = totalUploaded > 0 ? `Загружено за сессию: ${totalUploaded}` : '';
        renderHistory();
      }
    });

    function renderHistory() {
      historyEl.innerHTML = history.slice().reverse().map(h => {
        const icon = h.status === 'ok' ? '&#10004;' : h.status === 'error' ? '&#10008;' : '&#8987;';
        const color = h.status === 'ok' ? '#16a34a' : h.status === 'error' ? '#dc2626' : '#2563eb';
        return `<div class="history-item">
          <img src="${h.url}" alt="">
          <div class="info">${h.name}</div>
          <div class="status-icon" style="color:${color}">${icon}</div>
        </div>`;
      }).join('');
    }
  </script>
</body>
</html>
