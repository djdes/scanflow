<!--
  Profile page section.
  This dashboard does NOT load HTML fragments dynamically — all sections are
  inlined into app.html and toggled via display:none/block (see app.js route()).
  This file is preserved as a reference fragment; the live markup lives inside
  <section id="view-profile"> in app.html.
-->
<section id="view-profile">
  <div class="section-header">
    <h1>Профиль</h1>
    <p class="section-subtitle">Email и уведомления о событиях</p>
  </div>

  <div class="card">
    <fieldset class="form-group" style="border:none;padding:0;margin:0 0 20px 0">
      <legend style="font-weight:600;margin-bottom:8px">Email для уведомлений</legend>
      <input type="email" id="profile-email" placeholder="you@example.com" autocomplete="email">
      <div id="smtp-hint" class="field-hint" style="color:var(--warning)"></div>
    </fieldset>

    <fieldset class="form-group" style="border:none;padding:0;margin:0 0 20px 0">
      <legend style="font-weight:600;margin-bottom:8px">Режим уведомлений</legend>
      <div class="radio-group">
        <label class="radio-label">
          <input type="radio" name="profile-notify-mode" value="realtime">
          <div>
            <strong>Сразу</strong>
            <div class="radio-desc">Письмо на каждое событие</div>
          </div>
        </label>
        <label class="radio-label">
          <input type="radio" name="profile-notify-mode" value="digest_hourly" checked>
          <div>
            <strong>Раз в час (рекомендуется)</strong>
            <div class="radio-desc">Дайджест за последний час</div>
          </div>
        </label>
        <label class="radio-label">
          <input type="radio" name="profile-notify-mode" value="digest_daily">
          <div>
            <strong>Раз в день</strong>
            <div class="radio-desc">Сводка за сутки</div>
          </div>
        </label>
      </div>
    </fieldset>

    <fieldset class="form-group" style="border:none;padding:0;margin:0 0 20px 0">
      <legend style="font-weight:600;margin-bottom:8px">События</legend>
      <div class="profile-events">
        <label class="profile-event"><input type="checkbox" data-event="photo_uploaded"> Фото загружено</label>
        <label class="profile-event"><input type="checkbox" data-event="invoice_recognized"> Накладная распознана</label>
        <label class="profile-event"><input type="checkbox" data-event="recognition_error"> Ошибка распознавания (срочно)</label>
        <label class="profile-event"><input type="checkbox" data-event="suspicious_total"> Подозрительная сумма (срочно)</label>
        <label class="profile-event"><input type="checkbox" data-event="invoice_edited"> Правка в дашборде</label>
        <label class="profile-event"><input type="checkbox" data-event="approved_for_1c"> Утверждена для 1С</label>
        <label class="profile-event"><input type="checkbox" data-event="sent_to_1c"> Отправлена в 1С</label>
      </div>
    </fieldset>

    <div class="form-actions">
      <button class="btn btn-primary" id="profile-save-btn">Сохранить</button>
      <button class="btn btn-outline" id="profile-test-btn">Отправить тестовое письмо</button>
      <span id="profile-status" class="field-hint" style="margin-left:8px"></span>
    </div>
  </div>
</section>
