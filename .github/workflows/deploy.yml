name: Deploy to scanflow.ru

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Best-effort keyscan; we also use StrictHostKeyChecking=accept-new below as a safety net
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -T 10 ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>&1 || echo "keyscan failed, relying on accept-new"

      - name: Deploy via rsync
        run: |
          # Exclude ALL of data/, logs/, backups/ to avoid overwriting/ deleting
          # server-side state. The --exclude='data/*.sqlite*' patterns catch
          # database files that might land in the repo by accident.
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='data' \
            --exclude='logs' \
            --exclude='google-credentials.json' \
            --exclude='*.log' \
            --exclude='*.sqlite' \
            --exclude='*.sqlite-shm' \
            --exclude='*.sqlite-wal' \
            --exclude='.claude' \
            --exclude='.playwright-mcp' \
            --exclude='.vscode' \
            --exclude='nul' \
            --exclude='eng.traineddata' \
            --exclude='rus.traineddata' \
            --exclude='temp_invoice.json' \
            --exclude='cwww1C-JPGExchangetemp_invoice.json' \
            --exclude='architecture.excalidraw' \
            --exclude='architecture.png' \
            --exclude='improvements.excalidraw' \
            --exclude='improvements.png' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=accept-new" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/www/scanflow.ru/app/

      - name: Install dependencies and restart
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=accept-new ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd ~/www/scanflow.ru/app

          # Create data dirs if missing
          mkdir -p data/inbox data/processed data/failed

          # Install all dependencies (need devDeps for tsc)
          npm ci 2>&1 || npm install 2>&1

          # Build TypeScript
          npm run build 2>&1

          # Prune dev dependencies
          npm prune --production 2>&1

          # Restart with PM2
          pm2 startOrRestart ecosystem.config.js 2>&1
          pm2 save 2>&1

          # Give the app a moment to bind to the port, then hit /health.
          # A 200 body with {"ok":true,...} means migrations ran, DB is good,
          # and the static dashboard is reachable. Exit non-zero on failure so
          # the workflow goes red and someone notices.
          sleep 5
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 5 http://localhost:8899/health | grep -q '"status":"ok"'; then
              echo "Health check passed (attempt $i)"
              HEALTH_OK=1
              break
            fi
            echo "Health check attempt $i failed, retrying in 3s..."
            sleep 3
          done

          if [ -z "$HEALTH_OK" ]; then
            echo "Health check FAILED after deploy. Showing last 50 PM2 log lines:"
            pm2 logs scanflow --nostream --lines 50 2>&1 || true
            exit 1
          fi

          echo "Deploy complete!"
          ENDSSH
