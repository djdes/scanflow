name: Deploy to magday.ru

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='.env' \
            --exclude='data/database.sqlite' \
            --exclude='data/inbox/*' \
            --exclude='data/processed/*' \
            --exclude='data/failed/*' \
            --exclude='google-credentials.json' \
            --exclude='*.log' \
            --exclude='.claude' \
            --exclude='.playwright-mcp' \
            --exclude='.vscode' \
            --exclude='nul' \
            --exclude='eng.traineddata' \
            --exclude='rus.traineddata' \
            --exclude='temp_invoice.json' \
            --exclude='cwww1C-JPGExchangetemp_invoice.json' \
            --exclude='architecture.excalidraw' \
            --exclude='architecture.png' \
            --exclude='improvements.excalidraw' \
            --exclude='improvements.png' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/www/scan.magday.ru/app/

      - name: Install dependencies and restart
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd ~/www/scan.magday.ru/app

          # Create data dirs if missing
          mkdir -p data/inbox data/processed data/failed

          # Install all dependencies (need devDeps for tsc)
          npm ci 2>&1 || npm install 2>&1

          # Build TypeScript
          npm run build 2>&1

          # Prune dev dependencies
          npm prune --production 2>&1

          # Restart with PM2
          pm2 startOrRestart ecosystem.config.js 2>&1
          pm2 save 2>&1

          echo "Deploy complete!"
          ENDSSH
